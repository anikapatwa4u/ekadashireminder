name: Android Release

# Build and sign the Android app (.aab for Google Play, plus a signed .apk).
# Trigger manually from the Actions tab, or on pushing a version tag like "v1.1.0".
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      PROJECT: EkadashiReminder.csproj
      DOTNET_VERSION: '10.0.x'
      CONFIGURATION: Release
      FRAMEWORK: net10.0-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install MAUI Android workload
        run: |
          dotnet workload install maui-android
          dotnet workload list

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/signing.keystore
          echo "KEYSTORE_PATH=$RUNNER_TEMP/signing.keystore" >> "$GITHUB_ENV"

      - name: Compute version code
        id: versioncode
        run: |
          # Auto-increment: use the GitHub run number (+offset) so every build
          # gets a unique, ever-increasing versionCode that Google Play accepts.
          VERSION_CODE=$(( ${{ github.run_number }} + 100 ))
          echo "Using version code: $VERSION_CODE"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Publish signed .aab (Android App Bundle)
        run: |
          dotnet publish "$PROJECT" -f "$FRAMEWORK" -c "$CONFIGURATION" \
            /p:TargetFrameworks="$FRAMEWORK" \
            /p:ApplicationVersion=${{ steps.versioncode.outputs.version_code }} \
            /p:AndroidPackageFormats=aab \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore="$KEYSTORE_PATH" \
            /p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            /p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            /p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"

      - name: Locate .aab
        id: findaab
        run: |
          AAB_PATH=$(find bin -name "*-Signed.aab" | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            AAB_PATH=$(find bin -name "*.aab" | head -n 1)
          fi
          echo "Found AAB at: $AAB_PATH"
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: EkadashiReminder-aab
          path: ${{ steps.findaab.outputs.aab_path }}
