name: iOS Release

# Build, sign, and upload the iOS app to App Store Connect (TestFlight).
# Trigger manually from the Actions tab, or on pushing a version tag like "v1.1.0".
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    # .NET 10 for iOS requires Xcode 26. Use the macOS 26 runner image which ships it.
    runs-on: macos-26

    env:
      PROJECT: EkadashiReminder.csproj
      DOTNET_VERSION: '10.0.x'
      CONFIGURATION: Release
      FRAMEWORK: net10.0-ios
      RUNTIME_ID: ios-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show available Xcode versions and select a compatible one
        run: |
          # .NET 10 for iOS pins to an EXACT Xcode version (currently 26.5).
          # Selecting a newer Xcode (e.g. 26.6) also fails, so pick 26.5 if present,
          # otherwise fall back to the newest 26.x available.
          echo "Installed Xcodes:"
          ls /Applications | grep -i "Xcode"
          if [ -d "/Applications/Xcode_26.5.app" ]; then
            SELECTED="/Applications/Xcode_26.5.app"
          else
            SELECTED=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          echo "Selecting: $SELECTED"
          sudo xcode-select -s "$SELECTED"
          xcodebuild -version

      - name: Install MAUI workload
        run: |
          dotnet workload install maui
          dotnet workload list

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate (.p12)
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the keychain the default so codesign can find the identity
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"

      - name: Diagnose signing identity vs provisioning profile
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "===== Certificates in keychain ====="
          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

          echo ""
          echo "===== Provisioning profile details ====="
          PROFILE="$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          security cms -D -i "$PROFILE" > /tmp/profile.plist 2>/dev/null

          echo "--- Profile Name ---"
          /usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist

          echo "--- App ID (entitlements application-identifier) ---"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null || true

          echo "--- Certificate(s) the profile trusts (SHA-1) ---"
          # Extract each DeveloperCertificate and print its fingerprint
          COUNT=$(/usr/libexec/PlistBuddy -c "Print :DeveloperCertificates" /tmp/profile.plist | grep -c "Data" || echo 0)
          echo "Profile references $COUNT certificate(s)."
          python3 - <<'PY'
          import plistlib, hashlib
          with open('/tmp/profile.plist','rb') as f:
              p = plistlib.load(f)
          for i, cert in enumerate(p.get('DeveloperCertificates', [])):
              print(f"  cert[{i}] SHA-1: {hashlib.sha1(cert).hexdigest().upper()}")
          PY

      - name: Publish (build + sign + create .ipa)
        run: |
          dotnet publish "$PROJECT" -f "$FRAMEWORK" -c "$CONFIGURATION" \
            /p:ArchiveOnBuild=true \
            /p:RuntimeIdentifier=$RUNTIME_ID \
            /p:CodesignKey="${{ secrets.IOS_SIGNING_IDENTITY }}" \
            /p:CodesignProvision="${{ secrets.IOS_PROVISION_NAME }}"

      - name: Locate .ipa
        id: findipa
        run: |
          IPA_PATH=$(find bin -name "*.ipa" | head -n 1)
          echo "Found IPA at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (for download / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: EkadashiReminder-ipa
          path: ${{ steps.findipa.outputs.ipa_path }}

      - name: Upload to App Store Connect (TestFlight)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun altool --upload-app \
            -f "${{ steps.findipa.outputs.ipa_path }}" \
            -t ios \
            -u "$APPLE_ID" \
            -p "$APP_SPECIFIC_PASSWORD" \
            --asc-provider "$TEAM_ID"
