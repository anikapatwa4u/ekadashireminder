name: iOS Release

# Build, sign, and upload the iOS app to App Store Connect (TestFlight).
# Trigger manually from the Actions tab, or on pushing a version tag like "v1.1.0".
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    # .NET 10 for iOS requires Xcode 26. Use the macOS 26 runner image which ships it.
    runs-on: macos-26

    env:
      PROJECT: EkadashiReminder.csproj
      # Pin the SDK feature band. The iOS workload itself is installed at its latest
      # version in the workload step, which targets the healthy Xcode 26.6 on the runner.
      DOTNET_VERSION: '10.0.202'
      CONFIGURATION: Release
      FRAMEWORK: net10.0-ios
      RUNTIME_ID: ios-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Select a working Xcode toolchain
        id: xcode
        run: |
          # HARD-LEARNED LESSON: hard-coding an Xcode version and probing it with
          # `xcrun --find actool` is NOT reliable. `xcrun` and `xcodebuild -find`
          # resolve tools through DIFFERENT paths, and the .NET for iOS SDK uses:
          #     xcodebuild -sdk <macOS SDK> -find clang
          # On this runner some Xcodes (incl. 26.5.0) pass the xcrun probe but FAIL
          # that xcodebuild probe with "unable to find utility clang" - which is the
          # error we keep hitting deep in the build.
          #
          # So: iterate over EVERY installed Xcode and select the first one that
          # actually passes the exact xcodebuild -find checks for clang AND actool.
          echo "Installed Xcodes:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          SELECTED=""
          SELECTED_VER=""
          for XC in $(ls -d /Applications/Xcode*.app 2>/dev/null | sort -Vr); do
            DEV="$XC/Contents/Developer"
            SDK="$DEV/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
            echo "----- Evaluating $XC -----"
            if [ ! -x "$DEV/usr/bin/xcodebuild" ]; then
              echo "  skip: no xcodebuild"; continue
            fi
            if [ ! -d "$SDK" ]; then
              echo "  skip: macOS SDK missing"; continue
            fi
            # The build resolves tools through BOTH mechanisms depending on stage:
            #   * clang  -> xcodebuild -sdk <macOS SDK> -find clang
            #   * actool -> xcrun --find actool
            #   * ibtool -> xcrun --find ibtool  (storyboard compile)
            # On this runner these can DISAGREE for the same Xcode, and some Xcodes
            # (e.g. 26.6.0) are partial installs missing one tool but not others. An
            # Xcode must satisfy EVERY check below - all three tools via BOTH
            # resolution mechanisms - to be considered usable.
            if DEVELOPER_DIR="$DEV" xcodebuild -sdk "$SDK" -find clang  >/dev/null 2>&1 \
               && DEVELOPER_DIR="$DEV" xcodebuild -sdk "$SDK" -find actool >/dev/null 2>&1 \
               && DEVELOPER_DIR="$DEV" xcodebuild -sdk "$SDK" -find ibtool >/dev/null 2>&1 \
               && DEVELOPER_DIR="$DEV" xcrun --find clang  >/dev/null 2>&1 \
               && DEVELOPER_DIR="$DEV" xcrun --find actool >/dev/null 2>&1 \
               && DEVELOPER_DIR="$DEV" xcrun --find ibtool >/dev/null 2>&1; then
              SELECTED="$DEV"
              SELECTED_VER=$(DEVELOPER_DIR="$DEV" xcodebuild -version | head -n 1 | awk '{print $2}')
              echo "  -> USABLE (clang + actool + ibtool resolve via BOTH xcodebuild and xcrun). Version $SELECTED_VER"
              break
            else
              echo "  skip: clang/actool/ibtool not resolvable via both xcodebuild -find and xcrun --find"
            fi
          done

          if [ -z "$SELECTED" ]; then
            echo "No Xcode on this runner can resolve clang/actool/ibtool via both xcodebuild -find and xcrun --find." >&2
            exit 1
          fi

          sudo xcode-select -s "$SELECTED"
          echo "DEVELOPER_DIR=$SELECTED" >> "$GITHUB_ENV"
          echo "xcode_version=$SELECTED_VER" >> "$GITHUB_OUTPUT"
          echo "Selected developer directory: $SELECTED (Xcode $SELECTED_VER)"
          xcodebuild -version
          MACOS_SDK="$SELECTED/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
          xcodebuild -sdk "$MACOS_SDK" -find clang
          xcodebuild -sdk "$MACOS_SDK" -find actool
          xcodebuild -sdk "$MACOS_SDK" -find ibtool
          xcrun --find clang
          xcrun --find actool
          xcrun --find ibtool
          xcrun --find clang
          xcrun --find actool

      - name: Install MAUI workload
        run: |
          # KEY FINDING: the auto-selecting Xcode probe showed that on this runner the
          # HEALTHY Xcode (the one whose clang/actool resolve via `xcodebuild -find`)
          # is 26.6 - NOT 26.5. Xcode 26.5's toolchain is the broken one here.
          #
          # Therefore we must use the LATEST iOS workload (26.5.10301), which targets
          # Xcode 26.6, so the SDK's Xcode-version check passes against the healthy
          # Xcode 26.6. Do NOT downgrade to 26.5.10284 - that requires the broken
          # Xcode 26.5 and fails with "requires Xcode 26.5".
          dotnet workload install maui
          echo "===== Installed workloads ====="
          dotnet workload list
          echo "===== Installed Microsoft.iOS.Sdk packs ====="
          ls "$HOME/.dotnet/packs" | grep -i "Microsoft.iOS.Sdk" || true

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate (.p12)
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the keychain the default so codesign can find the identity
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"

      - name: Compute build number
        id: buildnum
        run: |
          # Auto-increment: use the GitHub run number (+offset so it always stays
          # above the manually uploaded builds 2/3/4). This guarantees a unique,
          # ever-increasing CFBundleVersion that App Store Connect accepts.
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))
          echo "Using build number: $BUILD_NUMBER"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Publish (build + sign + create .ipa)
        run: |
          # The auto-select step picks the Xcode whose clang/actool actually resolve
          # (26.6 on this runner), and the latest iOS workload (26.5.10301) targets
          # Xcode 26.6 - so the SDK version check matches naturally.
          echo "Building with Xcode ${{ steps.xcode.outputs.xcode_version }}"
          dotnet publish "$PROJECT" -f "$FRAMEWORK" -c "$CONFIGURATION" \
            /p:ArchiveOnBuild=true \
            /p:RuntimeIdentifier=$RUNTIME_ID \
            /p:ApplicationVersion=${{ steps.buildnum.outputs.build_number }} \
            /p:CodesignKey="${{ secrets.IOS_SIGNING_IDENTITY }}" \
            /p:CodesignProvision="${{ secrets.IOS_PROVISION_NAME }}"

      - name: Locate .ipa
        id: findipa
        run: |
          IPA_PATH=$(find bin -name "*.ipa" | head -n 1)
          echo "Found IPA at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (for download / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: EkadashiReminder-ipa
          path: ${{ steps.findipa.outputs.ipa_path }}

      - name: Upload to App Store Connect (TestFlight) via API key
        env:
          # App Store Connect API key (App Store Connect -> Users and Access -> Integrations -> App Store Connect API)
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          # altool/notarytool look for the .p8 key in one of these directories,
          # named AuthKey_<KEY_ID>.p8.
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          xcrun altool --upload-app \
            -f "${{ steps.findipa.outputs.ipa_path }}" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
