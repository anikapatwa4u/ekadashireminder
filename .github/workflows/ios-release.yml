name: iOS Release

# Build, sign, and upload the iOS app to App Store Connect (TestFlight).
# Trigger manually from the Actions tab, or on pushing a version tag like "v1.1.0".
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    # .NET 10 for iOS requires Xcode 26. Use the macOS 26 runner image which ships it.
    runs-on: macos-26

    env:
      PROJECT: EkadashiReminder.csproj
      # Pin the SDK so its iOS workload does not silently advance to a version
      # requiring a newer Xcode than the hosted runner provides.
      DOTNET_VERSION: '10.0.202'
      CONFIGURATION: Release
      FRAMEWORK: net10.0-ios
      RUNTIME_ID: ios-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Select Xcode 26.3 toolchain
        run: |
          # The pinned .NET 10.0.202 workload set ships the iOS pack 26.2.10233,
          # which requires Xcode 26.3. The Xcode version selected here MUST match
          # what the installed iOS workload expects, otherwise the build fails with
          # "This version of .NET for iOS requires Xcode 26.3".
          #
          # xcode-select must receive Contents/Developer, not the .app bundle itself.
          XCODE_APP=$(ls -d /Applications/Xcode_26.3*.app 2>/dev/null | head -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.3 is required by this pinned release workflow." >&2
            echo "Installed Xcodes:" >&2
            ls /Applications | grep -i "Xcode" >&2 || true
            exit 1
          fi

          DEVELOPER_PATH="$XCODE_APP/Contents/Developer"
          test -x "$DEVELOPER_PATH/usr/bin/xcodebuild"
          sudo xcode-select -s "$DEVELOPER_PATH"
          echo "DEVELOPER_DIR=$DEVELOPER_PATH" >> "$GITHUB_ENV"
          echo "Selected developer directory: $DEVELOPER_PATH"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          xcrun --sdk macosx clang++ --version
          xcrun --find actool
          xcrun --find ibtool

      - name: Install MAUI workload
        run: |
          # Pin the workload set as well as the SDK. Without --version, the command
          # downloads the newest iOS workload (currently 26.5.10301), which requires
          # Xcode 26.6. The 10.0.202 workload set is compatible with Xcode 26.5.
          dotnet workload install maui --version 10.0.202
          dotnet workload list

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate (.p12)
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the keychain the default so codesign can find the identity
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"

      - name: Compute build number
        id: buildnum
        run: |
          # Auto-increment: use the GitHub run number (+offset so it always stays
          # above the manually uploaded builds 2/3/4). This guarantees a unique,
          # ever-increasing CFBundleVersion that App Store Connect accepts.
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))
          echo "Using build number: $BUILD_NUMBER"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Publish (build + sign + create .ipa)
        run: |
          dotnet publish "$PROJECT" -f "$FRAMEWORK" -c "$CONFIGURATION" \
            /p:ArchiveOnBuild=true \
            /p:RuntimeIdentifier=$RUNTIME_ID \
            /p:ApplicationVersion=${{ steps.buildnum.outputs.build_number }} \
            /p:CodesignKey="${{ secrets.IOS_SIGNING_IDENTITY }}" \
            /p:CodesignProvision="${{ secrets.IOS_PROVISION_NAME }}"

      - name: Locate .ipa
        id: findipa
        run: |
          IPA_PATH=$(find bin -name "*.ipa" | head -n 1)
          echo "Found IPA at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (for download / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: EkadashiReminder-ipa
          path: ${{ steps.findipa.outputs.ipa_path }}

      - name: Upload to App Store Connect (TestFlight) via API key
        env:
          # App Store Connect API key (App Store Connect -> Users and Access -> Integrations -> App Store Connect API)
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          # altool/notarytool look for the .p8 key in one of these directories,
          # named AuthKey_<KEY_ID>.p8.
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          xcrun altool --upload-app \
            -f "${{ steps.findipa.outputs.ipa_path }}" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
